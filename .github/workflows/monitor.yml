name: Automated AI Text Detection Watch

on:
  schedule:
    # S'exécute toutes les 72 heures (tous les 3 jours) à 08:00 UTC
    - cron: '0 8 */3 * *'
  workflow_dispatch:
    # Permet de déclencher manuellement depuis l'interface GitHub

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    if: ${{ vars.DISABLE_MONITOR != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitoring pipeline
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py

      - name: Commit and push updated data and charts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          
          # Vérifie s'il y a des fichiers modifiés ou ajoutés à commiter
          if ! git diff --cached --quiet; then
            git commit -m "Archive automatique : nouvelles données et graphiques $(date +'%Y-%m-%d')"
            git push
          else
            echo "Aucune modification à commiter dans data/"
          fi
